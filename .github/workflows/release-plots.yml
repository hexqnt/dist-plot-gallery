name: Generate and publish plots

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to which the archive will be uploaded
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-plots-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-plots:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Generate plots
        run: uv run python main.py --output-dir distribution_plots --silence

      - name: Set release metadata
        id: release
        env:
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            base_version=$(sed -nE 's/^version = "([0-9]+\.[0-9]+\.[0-9]+)"/\1/p' pyproject.toml)
            test -n "$base_version"

            latest_version=$(
              git tag --list 'v*' |
                sed -nE 's/^v([0-9]+\.[0-9]+\.[0-9]+)$/\1/p' |
                sort -V |
                tail -n 1
            )

            if [ -n "$latest_version" ]; then
              major=${latest_version%%.*}
              remainder=${latest_version#*.}
              minor=${remainder%%.*}
              patch=${latest_version##*.}
              next_version="$major.$minor.$((patch + 1))"
              version=$(printf '%s\n%s\n' "$base_version" "$next_version" | sort -V | tail -n 1)
            else
              version="$base_version"
            fi

            tag="v${version}"
          else
            tag="${EVENT_RELEASE_TAG:-$INPUT_TAG}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "archive=distribution-plots-$tag.zip" >> "$GITHUB_OUTPUT"

      - name: Create ZIP archive
        run: zip -r "${{ steps.release.outputs.archive }}" distribution_plots

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          ARCHIVE_NAME: ${{ steps.release.outputs.archive }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            gh release create "$RELEASE_TAG" "$ARCHIVE_NAME" \
              --target "$GITHUB_SHA" --generate-notes
          else
            gh release upload "$RELEASE_TAG" "$ARCHIVE_NAME" --clobber
          fi
